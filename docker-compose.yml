# =============================================================================
# Agent Orchestrator — Docker Compose
# =============================================================================
# Usage:
#   docker compose up -d          # start all services
#   docker compose down           # stop services (data persists in volumes)
#   docker compose down -v        # stop and DELETE all data
#   docker compose logs api       # view orchestrator logs
#   docker compose logs db        # view database logs
#   docker compose exec db psql -U orchestrator -d agent_orchestrator
#                                 # open psql shell
#
# First-time workspace setup:
#   docker compose run --rm api init /workspace --template content-moderation
#
# API docs: http://localhost:8000/docs
# =============================================================================

services:
  api:
    build: .
    container_name: agent-orchestrator-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./workspace:/workspace
    environment:
      - AGENT_ORCH_OPENAI_API_KEY=${AGENT_ORCH_OPENAI_API_KEY:-}
      - AGENT_ORCH_ANTHROPIC_API_KEY=${AGENT_ORCH_ANTHROPIC_API_KEY:-}
      - AGENT_ORCH_GOOGLE_API_KEY=${AGENT_ORCH_GOOGLE_API_KEY:-}
      - AGENT_ORCH_GROK_API_KEY=${AGENT_ORCH_GROK_API_KEY:-}
      - OLLAMA_ENDPOINT=http://ollama:11434
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started

  ollama:
    image: ollama/ollama:latest
    container_name: agent-orchestrator-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull llama3.1:8b && wait"]

  db:
    image: postgres:16-alpine
    container_name: agent-orchestrator-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orchestrator}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-agent_orchestrator}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orchestrator} -d ${POSTGRES_DB:-agent_orchestrator}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
    driver: local
  ollama_data:
    driver: local
