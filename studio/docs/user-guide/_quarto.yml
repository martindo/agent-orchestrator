project:
  type: default

format:
  pdf:
    documentclass: article
    papersize: letter
    geometry:
      - margin=1in
    fontsize: 11pt
    colorlinks: true
    linkcolor: "blue"
    toc: true
    number-sections: true
    code-block-bg: "#f5f5f5"
    code-block-border-left: "#cccccc"
    highlight-style: github
    include-in-header:
      text: |
        \usepackage{float}
        \floatplacement{figure}{H}
    include-before-body:
      text: |
        \thispagestyle{empty}
        \begin{center}
        \vspace*{2cm}
        \includegraphics[width=0.65\textwidth]{images/logo.png}
        \vspace{1.5cm}

        {\Huge\bfseries User Guide}

        \vspace{0.5cm}

        {\Large Version 0.1.0}

        \vspace{1cm}

        {\large Visual IDE for Agent Orchestrator Workflows}

        \vspace{2cm}

        {\normalsize Generated by AI Documenter --- \today}
        \end{center}
        \newpage
  html:
    theme: cosmo
    toc: true
    number-sections: true
    code-fold: false
  docx:
    toc: true
    number-sections: true
