agents:
  - id: sentiment-analyzer
    name: Sentiment Analyzer
    description: Analyzes content sentiment
    system_prompt: You are a sentiment analysis agent.
    skills:
      - sentiment-analysis
      - nlp
    phases:
      - analysis
    llm:
      provider: openai
      model: gpt-4o
      temperature: 0.1
      max_tokens: 2000
    concurrency: 3
    retry_policy:
      max_retries: 2
      delay_seconds: 1.0
      backoff_multiplier: 2.0

  - id: content-reviewer
    name: Content Reviewer
    description: Reviews content against policies
    system_prompt: You are a content moderation reviewer.
    skills:
      - content-moderation
    phases:
      - review
    llm:
      provider: anthropic
      model: claude-sonnet-4-20250514
      temperature: 0.2
    concurrency: 2

  - id: escalation-handler
    name: Escalation Handler
    description: ""
    system_prompt: You are a senior escalation handler.
    phases:
      - escalation
    llm:
      provider: anthropic
      model: claude-sonnet-4-20250514
      temperature: 0.3
