name: CI

on:
  push:
    branches: [master]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-tests:
    name: API test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (with llm + mcp + sql extras)
        # The llm and mcp extras are REQUIRED — without them tests/conftest.py
        # cannot even be collected (the lazy provider imports raise
        # "cannot import name 'AnthropicProvider'"). sql pulls SQLAlchemy so the
        # persistence-backend tests run (against SQLite here).
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,llm,mcp,sql]"

      - name: Run pytest
        run: pytest tests -q

  postgres-tests:
    name: Persistence — PostgreSQL backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ao_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # Points the parametrized persistence tests at the real Postgres service,
      # so they run against SQLite AND PostgreSQL.
      AGENT_ORCH_DATABASE_URL: postgresql://postgres:test@localhost:5432/ao_test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install (with sql extra)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,llm,mcp,sql]"

      - name: Run persistence backend tests against PostgreSQL
        run: pytest tests/unit/test_persistence_backends.py -q

  studio-tests:
    name: Studio test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: studio/pyproject.toml

      - name: Install studio
        working-directory: studio
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        working-directory: studio
        run: pytest tests -q

  studio-frontend:
    name: Studio frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: studio/frontend/package-lock.json

      - name: Install and build
        working-directory: studio/frontend
        # `npm ci` reinstalls cleanly from the lockfile, which is why this
        # passes in CI even though the committed node_modules is stale/broken
        # (tracked as AUDIT-TASKS.md 5.2 — untrack node_modules).
        run: |
          npm ci
          npm run build
